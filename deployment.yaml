apiVersion: apps/v1
kind: Deployment
metadata:
  name: chijji-moni-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chijji-moni-app
  template:
    metadata:
      labels:
        app: chijji-moni-app
    spec:
      containers:
        - name: chijji-moni-app
          image: adityarawat1999/chijji-moni-app:1.0.2
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: chijji-moni-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"