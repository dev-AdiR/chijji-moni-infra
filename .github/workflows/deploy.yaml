name: Deploy to EKS

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Check if cluster exists and create if not
        run: |
          if aws eks describe-cluster --name chijji-moni-cluster --region ap-south-1 > /dev/null 2>&1; then
            echo "Cluster already exists, skipping creation"
          else
            echo "Cluster not found, creating with Terraform..."
            cd ${{ github.workspace }}/terraform && terraform init && terraform apply -auto-approve
          fi

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name chijji-moni-cluster --region ap-south-1

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/chijji-moni-app \
            chijji-moni-app=adityarawat1999/chijji-moni-app:${{ github.event.client_payload.sha }}
          kubectl rollout status deployment/chijji-moni-app